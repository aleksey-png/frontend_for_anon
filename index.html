<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Чат-приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #5d8aa8;
            --secondary: #f0f4f8;
            --accent: #ff6b6b;
            --text: #333;
            --light-text: #fff;
            --border-radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary), #87ceeb);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 32px);
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 24px;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--light-text);
            margin-bottom: 8px;
        }

        .gender-buttons, .search-buttons, .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: var(--border-radius);
            background: var(--secondary);
            color: var(--text);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--light-text);
        }

        .input-field {
            width: 100%;
            max-width: 300px;
            padding: 14px 16px;
            border: 2px solid var(--secondary);
            border-radius: var(--border-radius);
            font-size: 16px;
            outline: none;
            background: var(--secondary);
        }

        .input-field:focus {
            border-color: var(--primary);
        }

        .chat-container {
            flex: 1;
            background: var(--secondary);
            border-radius: var(--border-radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px 16px;
            border-radius: var(--border-radius);
            max-width: 70%;
        }

        .my-message {
            align-self: flex-end;
            background: var(--primary);
            color: var(--light-text);
        }

        .partner-message {
            align-self: flex-start;
            background: #e9ecef;
        }

        .chat-input {
            display: flex;
            padding: 16px;
            border-top: 1px solid #ddd;
            background: white;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            outline: none;
        }

        .chat-input button {
            padding: 12px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
        }

        .status-bar {
            padding: 8px 16px;
            background: rgba(255,255,255,0.9);
            border-radius: var(--border-radius);
            margin-bottom: 16px;
        }

        .vip-badge {
            color: gold;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Экран выбора пола -->
        <div id="gender-screen" class="screen active">
            <h1>Выбери свой пол</h1>
            <div class="gender-buttons">
                <button class="btn" data-gender="male">
                    <span>👦</span> Я парень
                </button>
                <button class="btn" data-gender="female">
                    <span>👧</span> Я девушка
                </button>
            </div>
        </div>

        <!-- Экран ввода возраста -->
        <div id="age-screen" class="screen">
            <h1>Введи возраст</h1>
            <input type="number" class="input-field" id="age-input" placeholder="Например: 25">
            <button class="btn btn-primary" id="age-submit">Далее</button>
        </div>

        <!-- Экран поиска собеседника -->
        <div id="search-screen" class="screen">
            <h1>Кого ищешь?</h1>
            <div class="search-buttons">
                <button class="btn" data-search="male">👦 Парень</button>
                <button class="btn" data-search="female">👧 Девушка</button>
                <button class="btn" data-search="any">🔀 Любой</button>
            </div>
        </div>

        <!-- Экран чата -->
        <div id="chat-screen" class="screen">
            <div class="status-bar">
                <span id="chat-status">Ищем собеседника...</span>
                <span class="vip-badge" id="vip-status"></span>
            </div>
            <div class="chat-container">
                <div class="chat-messages" id="messages-container">
                    <!-- Сообщения будут добавляться сюда -->
                </div>
                <div class="chat-input">
                    <input type="text" id="message-input" placeholder="Напиши сообщение...">
                    <button id="send-btn">Отправить</button>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn" id="next-chat">🔁 Следующий</button>
                <button class="btn" id="stop-chat">❌ Стоп</button>
            </div>
        </div>

                <!-- Экран профиля -->
        <div id="profile-screen" class="screen">
            <h1>👤 Мой профиль</h1>
            <div class="profile-info">
                <p><strong>Пол:</strong> <span id="profile-gender">Не указан</span></p>
                <p><strong>Возраст:</strong> <span id="profile-age">Не указан</span></p>
                <p><strong>Ищу:</strong> <span id="profile-search">Не указано</span></p>
                <p><strong>VIP:</strong> <span id="profile-vip">Нет</span></p>
            </div>
            <button class="btn btn-primary" id="back-to-search">Назад к поиску</button>
        </div>
    </div>

    <script>
       // Инициализация Telegram Web App
const tg = window.Telegram.WebApp;
tg.expand();

// Элементы DOM
const screens = {
    gender: document.getElementById('gender-screen'),
    age: document.getElementById('age-screen'),
    search: document.getElementById('search-screen'),
    chat: document.getElementById('chat-screen'),
    profile: document.getElementById('profile-screen')
};

const buttons = {
    gender: document.querySelectorAll('.gender-buttons .btn'),
    search: document.querySelectorAll('.search-buttons .btn'),
    nextChat: document.getElementById('next-chat'),
    stopChat: document.getElementById('stop-chat'),
    backToSearch: document.getElementById('back-to-search'),
    ageSubmit: document.getElementById('age-submit'),
    sendBtn: document.getElementById('send-btn')
};

const inputs = {
    age: document.getElementById('age-input'),
    message: document.getElementById('message-input')
};

const statusElements = {
    chatStatus: document.getElementById('chat-status'),
    vipStatus: document.getElementById('vip-status'),
    messagesContainer: document.getElementById('messages-container')
};

const profileElements = {
    gender: document.getElementById('profile-gender'),
    age: document.getElementById('profile-age'),
    search: document.getElementById('profile-search'),
    vip: document.getElementById('profile-vip')
};

// Данные пользователя
let userData = {
    gender: null,
    age: null,
    search: null,
    isVIP: false
};

// Переключение экранов
function showScreen(screenName) {
    Object.values(screens).forEach(screen => {
        screen.classList.remove('active');
    });
    screens[screenName].classList.add('active');
}

// Обработка выбора пола
buttons.gender.forEach(btn => {
    btn.addEventListener('click', function() {
        userData.gender = this.dataset.gender;
        sendDataToBot({action: 'set_gender', gender: userData.gender});
        showScreen('age');
    });
});

// Отправка возраста
buttons.ageSubmit.addEventListener('click', function() {
    const age = parseInt(inputs.age.value);
    if (age >= 10 && age <= 100) {
        userData.age = age;
        sendDataToBot({action: 'set_age', age: userData.age});
        showScreen('search');
    } else {
        alert('Введи нормальный возраст (10–100 лет)');
    }
});

// Выбор типа поиска
buttons.search.forEach(btn => {
    btn.addEventListener('click', function() {
        userData.search = this.dataset.search;
        sendDataToBot({action: 'set_search', search: userData.search});
        showScreen('chat');
        statusElements.chatStatus.textContent = 'Ищем собеседника...';
    });
});

// Отправка сообщений в чате
buttons.sendBtn.addEventListener('click', function() {
    const message = inputs.message.value.trim();
    if (message) {
        addMessage(message, 'my-message');
        sendDataToBot({action: 'send_message', message: message});
        inputs.message.value = '';
    }
});

// Следующий собеседник
buttons.nextChat.addEventListener('click', function() {
    sendDataToBot({action: 'next_chat'});
    statusElements.chatStatus.textContent = 'Ищем нового собеседника...';
});

// Остановка чата
buttons.stopChat.addEventListener('click', function() {
    sendDataToBot({action: 'stop_chat'});
    showScreen('search');
});

// Возврат к поиску из профиля
buttons.backToSearch.addEventListener('click', function() {
    showScreen('search');
});

// Добавление сообщения в чат
function addMessage(text, className) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${className}`;
    messageDiv.textContent = text;
    statusElements.messagesContainer.appendChild(messageDiv);
    statusElements.messagesContainer.scrollTop = statusElements.messagesContainer.scrollHeight;
}

// Отправка данных боту
function sendDataToBot(data) {
    tg.sendData(JSON.stringify(data));
}

// Обработчик входящих данных от бота
window.addEventListener('message', function(event) {
    try {
        const data = JSON.parse(event.data);

        switch (data.action) {
            case 'show_age_screen':
                showScreen('age');
                break;

            case 'show_search_screen':
                showScreen('search');
                break;

            case 'show_chat_screen':
                showScreen('chat');
                statusElements.chatStatus.textContent = data.status || 'Ищем собеседника...';
                break;

            case 'update_chat_status':
                statusElements.chatStatus.textContent = data.status;
                break;

            case 'message_sent':
                inputs.message.value = '';
                break;

            case 'new_message':
                addMessage(data.message, 'partner-message');
                break;

            case 'chat_found':
                statusElements.chatStatus.textContent = 'Собеседник найден!';
                if (data.isVIP) {
                    statusElements.vipStatus.textContent = '💎 VIP';
                } else {
                    statusElements.vipStatus.textContent = '';
                }
                break;

            case 'update_profile':
                updateProfile(data.user);
                break;

            case 'error':
                alert(data.message);
                break;
        }
    } catch (e) {
        console.error('Error processing bot message:', e);
    }
});

// Обновление профиля
function updateProfile(userData) {
    profileElements.gender.textContent = userData.gender === 'male' ? 'Парень' : 'Девушка';
    profileElements.age.textContent = userData.age;
    profileElements.search.textContent =
        userData.search === 'male' ? 'Парня' :
        userData.search === 'female' ? 'Девушку' : 'Любого';
    profileElements.vip.textContent = userData.isVIP ? 'Да' : 'Нет';
    if (userData.isVIP) {
        profileElements.vip.style.color = 'gold';
        profileElements.vip.style.fontWeight = 'bold';
    }
}

// Инициализация при загрузке
document.addEventListener('DOMContentLoaded', function() {
    // Получаем начальные данные пользователя
    sendDataToBot({action: 'get_profile'});

    // Добавляем кнопку профиля
    const profileBtn = document.createElement('button');
    profileBtn.className = 'btn';
    profileBtn.textContent = '👤 Профиль';
    profileBtn.style.position = 'fixed';
    profileBtn.style.top = '16px';
    profileBtn.style.right = '16px';
    profileBtn.addEventListener('click', function() {
        sendDataToBot({action: 'get_profile'});
        showScreen('profile');
    });
    document.body.appendChild(profileBtn);
});
    </script>
</body>
</html>
